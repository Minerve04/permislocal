<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PermisLocal — Les chantiers de demain, détectés aujourd'hui</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
  :root{
    --navy:#0f2437; --navy2:#16334e; --amber:#f5a623; --amber2:#e08c00;
    --bg:#f4f6f8; --card:#ffffff; --txt:#1c2b3a; --muted:#6b7c8d;
    --ok:#2e9e5b; --line:#e3e9ee;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--txt);height:100vh;display:flex;flex-direction:column;overflow:hidden}

  header{background:var(--navy);color:#fff;padding:10px 20px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
  .logo{font-size:20px;font-weight:800;letter-spacing:-.5px}
  .logo span{color:var(--amber)}
  .tagline{font-size:12.5px;opacity:.75}
  .demo-badge{margin-left:auto;background:var(--amber);color:var(--navy);font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px}
  .stats{display:flex;gap:18px;margin-left:12px}
  .stat{text-align:center}
  .stat b{display:block;font-size:17px;color:var(--amber)}
  .stat small{font-size:10.5px;opacity:.7}

  #layout{flex:1;display:flex;min-height:0}
  aside{width:390px;min-width:320px;background:var(--card);border-right:1px solid var(--line);display:flex;flex-direction:column}
  .filters{padding:12px 14px;border-bottom:1px solid var(--line)}
  .frow{display:flex;gap:8px;margin-bottom:9px}
  select,input[type=search]{flex:1;padding:7px 9px;border:1px solid var(--line);border-radius:8px;font-size:13px;background:#fff;color:var(--txt)}
  .chips{display:flex;flex-wrap:wrap;gap:6px}
  .chip{border:1px solid var(--line);background:#fff;border-radius:16px;padding:4px 10px;font-size:12px;cursor:pointer;user-select:none;transition:.15s;color:var(--muted)}
  .chip:hover{border-color:var(--amber)}
  .chip.on{background:var(--navy);border-color:var(--navy);color:#fff}
  .chip .n{font-size:10.5px;opacity:.65;margin-left:3px}

  #list{flex:1;overflow-y:auto;padding:10px 12px}
  .lead{background:#fff;border:1px solid var(--line);border-radius:10px;padding:11px 13px;margin-bottom:9px;cursor:pointer;transition:.15s}
  .lead:hover{border-color:var(--amber);box-shadow:0 2px 10px rgba(15,36,55,.08)}
  .lead.active{border-color:var(--amber);box-shadow:0 0 0 2px rgba(245,166,35,.35)}
  .lead .top{display:flex;justify-content:space-between;align-items:baseline;gap:8px}
  .lead h3{font-size:13.5px;font-weight:600;line-height:1.35}
  .lead .date{font-size:11px;color:var(--muted);white-space:nowrap}
  .lead .date.recent{color:var(--ok);font-weight:700}
  .lead .adr{font-size:12px;color:var(--muted);margin:5px 0 7px}
  .tags{display:flex;flex-wrap:wrap;gap:5px}
  .tag{font-size:10.5px;font-weight:600;padding:2.5px 8px;border-radius:10px;background:#eef3f7;color:var(--navy2)}
  .tag.pro{background:#fdf1dc;color:#8a5a00}
  .meta{font-size:11px;color:var(--muted);margin-top:6px;display:flex;gap:12px}
  #count{padding:6px 14px;font-size:12px;color:var(--muted);border-bottom:1px solid var(--line);background:#fafbfc}

  #map{flex:1}
  .popup h4{font-size:13.5px;margin-bottom:4px}
  .popup p{font-size:12px;color:#546575;margin-bottom:6px}
  .popup .actions{display:flex;gap:6px}
  .popup a,.popup button{font-size:11.5px;padding:4px 9px;border-radius:7px;border:1px solid var(--line);background:#fff;cursor:pointer;text-decoration:none;color:var(--navy)}
  .popup a:hover,.popup button:hover{border-color:var(--amber)}

  footer{background:var(--navy);color:rgba(255,255,255,.55);font-size:11px;padding:5px 20px;text-align:center}
  footer b{color:rgba(255,255,255,.85)}

  @media(max-width:820px){
    #layout{flex-direction:column}
    aside{width:100%;min-width:0;height:46vh}
    .stats{display:none}
  }
</style>
</head>
<body>

<header>
  <div>
    <div class="logo">Permis<span>Local</span></div>
    <div class="tagline" id="tagline">Les chantiers de demain, détectés aujourd'hui</div>
  </div>
  <div class="stats">
    <div class="stat"><b id="s-total">–</b><small>autorisations</small></div>
    <div class="stat"><b id="s-month">–</b><small>ce mois-ci</small></div>
    <div class="stat"><b id="s-top">–</b><small>commune la + active</small></div>
  </div>
  <div class="demo-badge" id="demo-badge" style="display:none">DONNÉES DE DÉMONSTRATION</div>
</header>

<div id="layout">
  <aside>
    <div class="filters">
      <div class="frow">
        <input type="search" id="q" placeholder="Rechercher (commune, rue, nature...)">
        <select id="periode">
          <option value="9999">Toute période</option>
          <option value="30">30 derniers jours</option>
          <option value="90" selected>3 derniers mois</option>
          <option value="180">6 derniers mois</option>
        </select>
      </div>
      <div class="chips" id="chips"></div>
    </div>
    <div id="count"></div>
    <div id="list"></div>
  </aside>
  <div id="map"></div>
</div>

<footer>Source : SITADEL (open data, SDES / data.gouv.fr) · Géocodage : API Adresse · <b>PermisLocal</b> — prototype</footer>

<script src="leads.js"></script>
<script>
const METIER_LABELS = {
  piscine:"Piscine", maison_neuve:"Maison neuve", extension:"Extension",
  garage_carport:"Garage / carport", toiture:"Toiture", solaire:"Solaire",
  veranda_terrasse:"Véranda / terrasse", cloture_portail:"Clôture / portail",
  abri_annexe:"Abri / annexe", renovation:"Rénovation", autre:"Autre"
};
const METIER_COLORS = {
  piscine:"#1e88c7", maison_neuve:"#e05747", extension:"#f5a623",
  garage_carport:"#8e6fc0", toiture:"#7a4b2a", solaire:"#e6b800",
  veranda_terrasse:"#2e9e5b", cloture_portail:"#5b7b93",
  abri_annexe:"#4aa89a", renovation:"#c05990", autre:"#90a0ae"
};

const DATA = (window.LEADS || {leads:[],demo:true});
if (DATA.demo) document.getElementById('demo-badge').style.display='block';
if (DATA.dept) document.getElementById('tagline').textContent =
  "Les chantiers de demain, détectés aujourd'hui — " + (DATA.dept_nom || "dept " + DATA.dept) + " (" + DATA.dept + ")";
const leads = DATA.leads;

// ----- carte -----
const map = L.map('map');
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
  {attribution:'© OpenStreetMap', maxZoom:19}).addTo(map);
const markers = L.layerGroup().addTo(map);

// ----- état des filtres -----
const state = {metiers:new Set(), periode:90, q:""};

function daysAgo(dstr){
  return Math.floor((Date.now() - new Date(dstr).getTime()) / 864e5);
}
function filtered(){
  const q = state.q.toLowerCase();
  return leads.filter(l =>
    (state.metiers.size===0 || l.metiers.some(m=>state.metiers.has(m))) &&
    daysAgo(l.date) <= state.periode &&
    (!q || (l.adresse+' '+l.nature+' '+(l.commune||'')).toLowerCase().includes(q))
  );
}

// ----- chips métiers -----
function buildChips(){
  const counts = {};
  leads.forEach(l=>l.metiers.forEach(m=>counts[m]=(counts[m]||0)+1));
  const el = document.getElementById('chips');
  Object.entries(counts).sort((a,b)=>b[1]-a[1]).forEach(([m,n])=>{
    const c = document.createElement('div');
    c.className='chip';
    c.innerHTML = METIER_LABELS[m] + '<span class="n">'+n+'</span>';
    c.onclick = ()=>{
      c.classList.toggle('on');
      c.classList.contains('on') ? state.metiers.add(m) : state.metiers.delete(m);
      render();
    };
    el.appendChild(c);
  });
}

// ----- rendu -----
let activeCard = null;
function render(){
  const rows = filtered().sort((a,b)=>b.date.localeCompare(a.date));
  document.getElementById('count').textContent =
    rows.length + ' opportunité' + (rows.length>1?'s':'') + ' correspondant aux filtres';

  // liste
  const list = document.getElementById('list');
  list.innerHTML='';
  rows.slice(0,200).forEach(l=>{
    const d = daysAgo(l.date);
    const card = document.createElement('div');
    card.className='lead';
    card.innerHTML = `
      <div class="top"><h3>${l.nature}</h3>
        <span class="date ${d<=14?'recent':''}">${d<=0?"aujourd'hui":"il y a "+d+" j"}</span></div>
      <div class="adr">📍 ${l.adresse}${l.cp?' · '+l.cp:''}</div>
      <div class="tags">${l.metiers.map(m=>'<span class="tag">'+METIER_LABELS[m]+'</span>').join('')}
        ${l.demandeur_pro?'<span class="tag pro">PRO : '+l.demandeur_pro+'</span>':''}</div>
      <div class="meta">
        ${+l.surface_creee?'<span>🏠 '+l.surface_creee+' m² créés</span>':''}
        ${+l.surface_terrain?'<span>📐 terrain '+l.surface_terrain+' m²</span>':''}
        <span>n° ${l.id}</span>
      </div>`;
    card.onclick = ()=>{
      if(activeCard) activeCard.classList.remove('active');
      card.classList.add('active'); activeCard = card;
      map.flyTo([l.lat,l.lon],15,{duration:.6});
      l._marker && l._marker.openPopup();
    };
    list.appendChild(card);
  });

  // marqueurs
  markers.clearLayers();
  rows.forEach(l=>{
    const color = METIER_COLORS[l.metiers[0]] || '#90a0ae';
    const mk = L.circleMarker([l.lat,l.lon],
      {radius:7,color:'#fff',weight:1.5,fillColor:color,fillOpacity:.92});
    mk.bindPopup(`<div class="popup">
      <h4>${l.nature}</h4>
      <p>📍 ${l.adresse}<br>🗓 autorisé le ${l.date} · n° ${l.id}
      ${l.demandeur_pro?'<br>🏢 '+l.demandeur_pro+(l.siren?' (SIREN '+l.siren+')':''):''}</p>
      <div class="actions">
        <button onclick="navigator.clipboard.writeText('${(l.adresse||'').replace(/'/g,"\\'")}')">Copier l'adresse</button>
        <a target="_blank" href="https://www.google.com/maps?q=${l.lat},${l.lon}">Voir sur Maps</a>
      </div></div>`);
    mk.addTo(markers);
    l._marker = mk;
  });

  if(rows.length){
    map.fitBounds(rows.map(l=>[l.lat,l.lon]),{padding:[30,30],maxZoom:12});
  }
}

// ----- stats header -----
function stats(){
  document.getElementById('s-total').textContent = leads.length;
  document.getElementById('s-month').textContent = leads.filter(l=>daysAgo(l.date)<=30).length;
  const byCom = {};
  leads.forEach(l=>{const c=l.commune||l.cp; byCom[c]=(byCom[c]||0)+1;});
  const top = Object.entries(byCom).sort((a,b)=>b[1]-a[1])[0];
  document.getElementById('s-top').textContent = top ? top[0] : '–';
}

document.getElementById('periode').onchange = e=>{state.periode=+e.target.value;render();};
document.getElementById('q').oninput = e=>{state.q=e.target.value;render();};

buildChips(); stats(); render();
</script>
</body>
</html>
