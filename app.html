<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChantierSignal — Vos chantiers</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
  :root{
    --navy:#0f2437; --navy2:#16334e; --amber:#f5a623; --amber2:#e08c00;
    --bg:#f4f6f8; --card:#ffffff; --txt:#1c2b3a; --muted:#6b7c8d;
    --ok:#2e9e5b; --line:#e3e9ee;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--txt);height:100vh;display:flex;flex-direction:column;overflow:hidden}

  header{background:var(--navy);color:#fff;padding:10px 20px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
  .logo{font-size:20px;font-weight:800;letter-spacing:-.5px;display:flex;align-items:center;gap:8px}
  .logo span{color:var(--amber)}
  .trial{margin-left:auto;display:flex;align-items:center;gap:10px}
  .trial .days{background:rgba(245,166,35,.15);border:1px solid rgba(245,166,35,.5);color:var(--amber);font-size:12px;font-weight:700;padding:5px 12px;border-radius:20px}
  .trial a{background:var(--amber);color:var(--navy);font-weight:700;font-size:12.5px;padding:7px 14px;border-radius:8px;text-decoration:none}

  #layout{flex:1;display:flex;min-height:0}
  aside{width:390px;min-width:320px;background:var(--card);border-right:1px solid var(--line);display:flex;flex-direction:column}
  .filters{padding:12px 14px;border-bottom:1px solid var(--line)}
  .frow{display:flex;gap:8px;margin-bottom:9px}
  select,input[type=search]{flex:1;padding:7px 9px;border:1px solid var(--line);border-radius:8px;font-size:13px;background:#fff;color:var(--txt)}
  .chips{display:flex;flex-wrap:wrap;gap:6px}
  .chip{border:1px solid var(--line);background:#fff;border-radius:16px;padding:4px 10px;font-size:12px;cursor:pointer;user-select:none;transition:.15s;color:var(--muted)}
  .chip:hover{border-color:var(--amber)}
  .chip.on{background:var(--navy);border-color:var(--navy);color:#fff}
  .chip .n{font-size:10.5px;opacity:.65;margin-left:3px}

  #list{flex:1;overflow-y:auto;padding:10px 12px}
  .lead{background:#fff;border:1px solid var(--line);border-radius:10px;padding:11px 13px;margin-bottom:9px;cursor:pointer;transition:.15s}
  .lead:hover{border-color:var(--amber);box-shadow:0 2px 10px rgba(15,36,55,.08)}
  .lead.active{border-color:var(--amber);box-shadow:0 0 0 2px rgba(245,166,35,.35)}
  .lead .top{display:flex;justify-content:space-between;align-items:baseline;gap:8px}
  .lead h3{font-size:13.5px;font-weight:600;line-height:1.35}
  .lead .date{font-size:11px;color:var(--muted);white-space:nowrap}
  .lead .date.recent{color:var(--ok);font-weight:700}
  .lead .adr{font-size:12px;color:var(--muted);margin:5px 0 7px}
  .tags{display:flex;flex-wrap:wrap;gap:5px}
  .tag{font-size:10.5px;font-weight:600;padding:2.5px 8px;border-radius:10px;background:#eef3f7;color:var(--navy2)}
  .tag.pro{background:#fdf1dc;color:#8a5a00}
  .meta{font-size:11px;color:var(--muted);margin-top:6px;display:flex;gap:12px;flex-wrap:wrap}
  #count{padding:6px 14px;font-size:12px;color:var(--muted);border-bottom:1px solid var(--line);background:#fafbfc}

  #map{flex:1}
  .popup h4{font-size:13.5px;margin-bottom:4px}
  .popup p{font-size:12px;color:#546575;margin-bottom:6px}
  .popup .actions{display:flex;gap:6px}
  .popup a,.popup button{font-size:11.5px;padding:4px 9px;border-radius:7px;border:1px solid var(--line);background:#fff;cursor:pointer;text-decoration:none;color:var(--navy)}
  .popup a:hover,.popup button:hover{border-color:var(--amber)}

  /* écrans d'état (chargement / accès refusé) */
  #gate{position:fixed;inset:0;background:var(--navy);color:#fff;display:flex;align-items:center;justify-content:center;z-index:999;text-align:center;padding:24px}
  #gate .box{max-width:480px}
  #gate h1{font-size:26px;margin-bottom:12px;letter-spacing:-.5px}
  #gate p{font-size:15px;opacity:.8;line-height:1.6;margin-bottom:22px}
  #gate .btn{display:inline-block;background:var(--amber);color:var(--navy);font-weight:800;font-size:15px;padding:13px 28px;border-radius:10px;text-decoration:none}
  #gate .spin{width:44px;height:44px;border:4px solid rgba(255,255,255,.2);border-top-color:var(--amber);border-radius:50%;margin:0 auto 18px;animation:r 1s linear infinite}
  @keyframes r{to{transform:rotate(360deg)}}

  @media(max-width:820px){
    #layout{flex-direction:column}
    aside{width:100%;min-width:0;height:46vh}
  }
</style>
</head>
<body>

<div id="gate"><div class="box">
  <div class="spin" id="gate-spin"></div>
  <h1 id="gate-title">Vérification de votre accès…</h1>
  <p id="gate-msg">Un instant, on prépare vos chantiers.</p>
  <span id="gate-actions"></span>
</div></div>

<header>
  <div class="logo"><svg width="26" height="26" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg"><rect width="64" height="64" rx="14" fill="#f5a623" opacity="0.12"/><g fill="none" stroke="#f5a623" stroke-linecap="round"><path d="M20 34 A12 12 0 0 1 32 46" stroke-width="5.5"/><path d="M20 24 A22 22 0 0 1 42 46" stroke-width="5.5"/><path d="M20 14 A32 32 0 0 1 52 46" stroke-width="5.5"/></g><circle cx="20" cy="46" r="5" fill="#f5a623"/></svg><div>Chantier<span>Signal</span></div></div>
  <div class="trial" id="trial" style="display:none">
    <span class="days" id="days-left"></span>
    <a href="mailto:bonjour@chantiersignal.fr?subject=Abonnement%20ChantierSignal%20(59%E2%82%AC%2Fmois)">Continuer après l'essai — 59 €/mois</a>
  </div>
</header>

<div id="layout">
  <aside>
    <div class="filters">
      <div class="frow">
        <input type="search" id="q" placeholder="Rechercher (commune, rue, nature...)">
        <select id="periode">
          <option value="9999">Toute période</option>
          <option value="30">30 derniers jours</option>
          <option value="90">3 derniers mois</option>
          <option value="180" selected>6 derniers mois</option>
        </select>
      </div>
      <div class="chips" id="chips"></div>
    </div>
    <div id="count"></div>
    <div id="list"></div>
  </aside>
  <div id="map"></div>
</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzP6ZB3f8DlUMdKpghYlZOlaHrpQiFNd0Xi7WB9Dq4iNqd6oQ3rGpyCT9XdGCDxNBks/exec";

const METIER_LABELS = {
  piscine:"Piscine", maison_neuve:"Maison neuve", extension:"Extension",
  garage_carport:"Garage / carport", toiture:"Toiture", solaire:"Solaire",
  veranda_terrasse:"Véranda / terrasse", cloture_portail:"Clôture / portail",
  abri_annexe:"Abri / annexe", renovation:"Rénovation", autre:"Autre"
};
const METIER_COLORS = {
  piscine:"#1e88c7", maison_neuve:"#e05747", extension:"#f5a623",
  garage_carport:"#8e6fc0", toiture:"#7a4b2a", solaire:"#e6b800",
  veranda_terrasse:"#2e9e5b", cloture_portail:"#5b7b93",
  abri_annexe:"#4aa89a", renovation:"#c05990", autre:"#90a0ae"
};

function gate(title, msg, actionsHtml){
  document.getElementById('gate-spin').style.display = 'none';
  document.getElementById('gate-title').textContent = title;
  document.getElementById('gate-msg').innerHTML = msg;
  document.getElementById('gate-actions').innerHTML = actionsHtml || '';
}

const token = new URLSearchParams(location.search).get('t');
if (!token) {
  gate("Lien d'accès manquant",
    "Cette page s'ouvre avec le lien personnel reçu par email lors de votre inscription.",
    '<a class="btn" href="landing.html">Commencer mes 7 jours gratuits</a>');
} else {
  // JSONP : contourne les restrictions CORS d'Apps Script
  window.onAccess = function(res){
    if (!res || !res.access) {
      if (res && res.reason === 'expire') {
        gate("Votre essai gratuit est terminé",
          "Vos 7 jours d'essai sont écoulés. Pour continuer à recevoir les chantiers de votre secteur, passez à l'abonnement — sans engagement, résiliable en 1 clic.",
          '<a class="btn" href="mailto:bonjour@chantiersignal.fr?subject=Abonnement%20ChantierSignal">Continuer — 59 €/mois</a>');
      } else {
        gate("Lien d'accès invalide",
          "Ce lien ne correspond à aucun compte. Vérifiez l'email reçu lors de votre inscription, ou réinscrivez-vous.",
          '<a class="btn" href="landing.html">Retour à l\'inscription</a>');
      }
      return;
    }
    document.getElementById('gate').style.display = 'none';
    if (res.joursRestants !== null && res.joursRestants !== undefined) {
      document.getElementById('trial').style.display = 'flex';
      document.getElementById('days-left').textContent =
        res.joursRestants > 1 ? res.joursRestants + " jours d'essai restants" : "Dernier jour d'essai !";
    }
    boot(res.data || {leads:[]});
  };
  const s = document.createElement('script');
  s.src = SCRIPT_URL + '?t=' + encodeURIComponent(token) + '&callback=onAccess';
  s.onerror = () => gate("Service momentanément indisponible", "Réessayez dans une minute.", '');
  document.head.appendChild(s);
  setTimeout(() => {
    if (document.getElementById('gate').style.display !== 'none' &&
        document.getElementById('gate-spin').style.display !== 'none') {
      gate("Service momentanément indisponible", "Le serveur ne répond pas. Réessayez dans une minute.", '');
    }
  }, 20000);
}

// ----- application carte (identique à la démo, données injectées) -----
function boot(DATA){
  const leads = DATA.leads || [];
  const map = L.map('map');
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
    {attribution:'© OpenStreetMap', maxZoom:19}).addTo(map);
  const markers = L.layerGroup().addTo(map);
  const state = {metiers:new Set(), periode:180, q:""};

  const daysAgo = d => Math.floor((Date.now() - new Date(d).getTime()) / 864e5);
  const filtered = () => {
    const q = state.q.toLowerCase();
    return leads.filter(l =>
      (state.metiers.size===0 || l.metiers.some(m=>state.metiers.has(m))) &&
      daysAgo(l.date) <= state.periode &&
      (!q || (l.adresse+' '+l.nature+' '+(l.commune||'')).toLowerCase().includes(q))
    );
  };

  const counts = {};
  leads.forEach(l=>l.metiers.forEach(m=>counts[m]=(counts[m]||0)+1));
  const chipsEl = document.getElementById('chips');
  Object.entries(counts).sort((a,b)=>b[1]-a[1]).forEach(([m,n])=>{
    const c = document.createElement('div');
    c.className='chip';
    c.innerHTML = (METIER_LABELS[m]||m) + '<span class="n">'+n+'</span>';
    c.onclick = ()=>{
      c.classList.toggle('on');
      c.classList.contains('on') ? state.metiers.add(m) : state.metiers.delete(m);
      render();
    };
    chipsEl.appendChild(c);
  });

  let activeCard = null;
  function render(){
    const rows = filtered().sort((a,b)=>b.date.localeCompare(a.date));
    document.getElementById('count').textContent =
      rows.length + ' opportunité' + (rows.length>1?'s':'') + ' correspondant aux filtres';
    const list = document.getElementById('list');
    list.innerHTML='';
    rows.slice(0,300).forEach(l=>{
      const d = daysAgo(l.date);
      const card = document.createElement('div');
      card.className='lead';
      card.innerHTML = `
        <div class="top"><h3>${l.nature}</h3>
          <span class="date ${d<=30?'recent':''}">${d<=0?"aujourd'hui":"il y a "+d+" j"}</span></div>
        <div class="adr">📍 ${l.adresse}${l.cp && l.cp!=='nan'?' · '+l.cp:''}</div>
        <div class="tags">${l.metiers.map(m=>'<span class="tag">'+(METIER_LABELS[m]||m)+'</span>').join('')}
          ${l.demandeur_pro?'<span class="tag pro">PRO : '+l.demandeur_pro+'</span>':''}</div>
        <div class="meta">
          ${+l.surface_creee?'<span>🏠 '+l.surface_creee+' m² créés</span>':''}
          ${+l.surface_terrain?'<span>📐 terrain '+l.surface_terrain+' m²</span>':''}
          <span>n° ${l.id}</span>
        </div>`;
      card.onclick = ()=>{
        if(activeCard) activeCard.classList.remove('active');
        card.classList.add('active'); activeCard = card;
        map.flyTo([l.lat,l.lon],15,{duration:.6});
        l._marker && l._marker.openPopup();
      };
      list.appendChild(card);
    });

    markers.clearLayers();
    rows.forEach(l=>{
      const color = METIER_COLORS[l.metiers[0]] || '#90a0ae';
      const mk = L.circleMarker([l.lat,l.lon],
        {radius:7,color:'#fff',weight:1.5,fillColor:color,fillOpacity:.92});
      mk.bindPopup(`<div class="popup">
        <h4>${l.nature}</h4>
        <p>📍 ${l.adresse}<br>🗓 autorisé le ${l.date} · n° ${l.id}
        ${l.demandeur_pro?'<br>🏢 '+l.demandeur_pro+(l.siren?' (SIREN '+l.siren+')':''):''}</p>
        <div class="actions">
          <button onclick="navigator.clipboard.writeText('${(l.adresse||'').replace(/'/g,"\\'")}')">Copier l'adresse</button>
          <a target="_blank" href="https://www.google.com/maps?q=${l.lat},${l.lon}">Voir sur Maps</a>
        </div></div>`);
      mk.addTo(markers);
      l._marker = mk;
    });

    if(rows.length){
      map.fitBounds(rows.map(l=>[l.lat,l.lon]),{padding:[30,30],maxZoom:12});
    } else {
      map.setView([50.5, 2.4], 9);
    }
  }

  document.getElementById('periode').onchange = e=>{state.periode=+e.target.value;render();};
  document.getElementById('q').oninput = e=>{state.q=e.target.value;render();};
  render();
}
</script>
</body>
</html>
