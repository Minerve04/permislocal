name: Mise a jour des leads SITADEL

on:
  workflow_dispatch:        # lancement manuel depuis l'onglet Actions
  schedule:
    - cron: '0 6 5 * *'     # le 5 de chaque mois a 6h UTC (apres publication SITADEL)

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installer les dependances
        run: pip install requests pandas

      - name: Generer les leads (Pas-de-Calais)
        run: python pipeline_sitadel.py --dept 62 --mois 6 --out leads.json

      - name: Committer les nouvelles donnees
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add leads.json leads.js
          git diff --cached --quiet || git commit -m "MAJ leads SITADEL (dept 62)"
          git pull --rebase origin main
          git push
